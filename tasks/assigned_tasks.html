<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tildelte eksamensopgaver</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; color: #1f2937; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    table { border-collapse: collapse; width: 100%; max-width: 1200px; }
    th, td { border: 1px solid #d1d5db; padding: 8px 10px; text-align: left; }
    th { background: #e5e7eb; }
    tbody tr:nth-child(even) { background: #f9fafb; }
    tbody tr:nth-child(odd) { background: #ffffff; }
  </style>
</head>
<body>
  <h1>Tildelte eksamensopgaver</h1>
  <table>
    <thead>
      <tr><th>Nummer</th><th>Navn</th><th>Opgave</th></tr>
    </thead>
    <tbody>
      <tr><td>1</td><td>Alice</td><td>C.txt</td></tr>
      <tr><td>2</td><td>Bob</td><td>B.txt</td></tr>
      <tr><td>3</td><td>Cara</td><td>A.txt</td></tr>
    </tbody>
  </table>
</body>
</html>
